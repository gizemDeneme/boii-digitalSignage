plugins {
    id 'com.android.application'
}

android {
    namespace 'com.boii.tv'
    compileSdk 34

    defaultConfig {
        applicationId "com.boii.tv"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // APK dosya adı
    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "boii-tv-${variant.buildType.name}.apk"
        }
    }
}

dependencies {}

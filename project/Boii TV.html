<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boii Rest & Breakfast — TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,500&family=Cormorant+Garamond:wght@500;600;700&family=Lora:wght@400;500;600&family=Marcellus&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f1e8d8;
    --bg2: #e8ddc8;
    --surface: #fbf6ec;
    --surface2: #f6efe1;
    --ink: #2c2417;
    --ink-soft: #6c5e48;
    --ink-faint: #97876e;
    --line: #ddd0b6;
    --line-soft: #e7dcc6;
    --accent: #b0613e;
    --accent2: #7d7a4e;
    --font-display: "Spectral", Georgia, serif;
    --font-ui: "Hanken Grotesk", system-ui, sans-serif;
    --radius: 22px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #11100d; overflow: hidden; font-family: var(--font-ui); }
  .tv-viewport { position: fixed; inset: 0; background: #100f0c; display: flex; align-items: center; justify-content: center; }
  .tv-canvas {
    position: relative; flex: 0 0 auto;
    width: 1920px; height: 1080px; transform-origin: center center;
    background: var(--bg); color: var(--ink); overflow: hidden;
  }

  /* ---------- ekran geçişi ---------- */
  .screen-anim { width: 100%; height: 100%; }
  .screen { position: relative; width: 1920px; height: 1080px; padding: 52px 76px 0; }
  .home { display: flex; flex-direction: column; }
  .home-main { flex: 1 1 auto; min-height: 0; }

  /* warm ambient bg */
  .home-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1100px 620px at 78% -8%, rgba(176,97,62,.16), transparent 60%),
      radial-gradient(900px 600px at 8% 108%, rgba(125,122,78,.14), transparent 60%);
  }
  .home-bg::after { content: ""; position: absolute; right: -30px; bottom: -24px; width: 720px; height: 530px;
    background: url('assets/boii-sketch.png') no-repeat right bottom / contain; opacity: .06; }
  .home .home-main { position: relative; z-index: 1; }

  /* ---------- ÜST BAR ---------- */
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; min-height: 84px; position: relative; z-index: 2; flex: 0 0 auto; }
  .brand { display: flex; flex-direction: column; gap: 11px; }
  .brand-logo { height: 52px; width: auto; display: block; margin-left: -2px; }
  .brand-mark { font-family: var(--font-display); font-size: 46px; font-weight: 600; letter-spacing: .5px; color: var(--ink); line-height: 1; }
  .brand-mark span { color: var(--accent); }
  .brand-sub { font-size: 14px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-faint); white-space: nowrap; }
  .topbar-right { display: flex; align-items: center; gap: 34px; }
  .weather { display: flex; align-items: center; gap: 10px; color: var(--ink-soft); }
  .weather .icon { color: var(--accent); }
  .weather-temp { font-size: 30px; font-weight: 600; color: var(--ink); }
  .weather-meta { font-size: 16px; color: var(--ink-faint); }
  .clock { text-align: right; }
  .clock-time { font-size: 30px; font-weight: 600; color: var(--ink); line-height: 1; }
  .clock-date { font-size: 15px; color: var(--ink-faint); text-transform: capitalize; margin-top: 5px; }
  .lang-toggle { display: flex; align-items: center; gap: 8px; padding: 11px 18px; border-radius: 999px; border: 1.5px solid var(--line); background: var(--surface); font-size: 18px; font-weight: 600; color: var(--ink-faint); }
  .lang-toggle .icon { color: var(--ink-soft); }
  .lang-toggle .on { color: var(--accent); }
  .lang-toggle .sep { color: var(--line); }

  /* ---------- ODAK ---------- */
  .focusable { outline: none; cursor: pointer; transition: transform .2s cubic-bezier(.2,.7,.2,1), box-shadow .2s, background .2s, border-color .2s; }
  .lang-toggle.is-focused, .hint-home.is-focused { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent); transform: translateY(-2px); }

  /* ---------- KARŞILAMA ---------- */
  .welcome { padding: 8px 0 22px; }
  .welcome-eyebrow { font-size: 18px; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .welcome-name { font-family: var(--font-display); font-weight: 500; font-size: 62px; line-height: 1.04; color: var(--ink); margin-top: 14px; letter-spacing: -.5px; }
  .welcome-name em { font-style: italic; color: var(--accent); }
  .welcome-tag { font-size: 22px; color: var(--ink-soft); margin-top: 14px; }
  .welcome-big .welcome-name { font-size: 78px; }
  .welcome-big .welcome-tag { font-size: 25px; }

  /* ---------- TILE ---------- */
  .tile { position: relative; display: flex; flex-direction: column; justify-content: space-between;
    background: var(--surface); border: 1.5px solid var(--line-soft); border-radius: var(--radius);
    padding: 30px 32px; overflow: hidden; box-shadow: 0 2px 0 rgba(0,0,0,.02); }
  .tile::after { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--accent); opacity: 0; transition: opacity .2s; }
  .tile.is-focused { transform: translateY(-7px) scale(1.018); border-color: var(--accent); box-shadow: 0 26px 52px -22px rgba(74,46,24,.55); background: #fffaf0; }
  .tile.is-focused::after { opacity: 1; }
  .tile-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .tile-num { font-family: var(--font-display); font-size: 22px; color: var(--ink-faint); letter-spacing: .1em; }
  .tile-ic { display: grid; place-items: center; width: 64px; height: 64px; border-radius: 16px; background: var(--surface2); color: var(--accent); border: 1px solid var(--line-soft); transition: background .2s, color .2s; }
  .tile.is-focused .tile-ic { background: var(--accent); color: #fff7ee; border-color: var(--accent); }
  .tile-title { font-family: var(--font-display); font-size: 32px; font-weight: 600; color: var(--ink); line-height: 1.1; white-space: nowrap; }
  .tile-sub { font-size: 18px; color: var(--ink-soft); margin-top: 8px; }
  .tile-go { position: absolute; right: 28px; bottom: 26px; color: var(--accent); opacity: 0; transform: translateX(-6px); transition: opacity .2s, transform .2s; }
  .tile.is-focused .tile-go { opacity: 1; transform: none; }

  /* GRID layout */
  .grid-main { display: flex; flex-direction: column; }
  .layout-grid .welcome { padding: 2px 0 16px; }
  .layout-grid .welcome-name { font-size: 54px; }
  .tile-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 1fr; gap: 24px; flex: 1; padding-bottom: 48px; }

  /* HERO layout */
  .hero-main { display: grid; grid-template-columns: 1fr 0.86fr; gap: 30px; padding-bottom: 56px; align-items: stretch; }
  .hero-left { display: flex; flex-direction: column; }
  .tile-feature { flex: 1; margin-top: 8px; justify-content: flex-end; min-height: 0; background: linear-gradient(150deg, #fffaf0, var(--surface)); }
  .tile-feature .tile-ic { width: 80px; height: 80px; }
  .tile-feature .tile-title { font-size: 44px; }
  .tile-feature .tile-sub { font-size: 22px; }
  .hero-right { display: grid; grid-auto-rows: 1fr; gap: 18px; }
  .tile-slim { flex-direction: row; align-items: center; gap: 22px; padding: 22px 28px; }
  .tile-slim .tile-top { flex-direction: row; align-items: center; gap: 22px; width: auto; }
  .tile-slim .tile-body { flex: 1; }
  .tile-slim .tile-title { font-size: 27px; }
  .tile-slim .tile-sub { font-size: 16px; margin-top: 4px; }
  .tile-slim .tile-num { display: none; }
  .tile-slim .tile-go { position: static; opacity: 1; transform: none; margin-left: auto; }

  /* MAGAZINE layout */
  .mag-main { display: flex; flex-direction: column; gap: 24px; padding-bottom: 44px; }
  .mag-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; flex: 1; min-height: 0; }
  .mag-pick { position: relative; height: 100%; min-height: 0; border-radius: var(--radius); overflow: hidden; border: 1.5px solid var(--line); }
  .mag-pick::after { content: ""; position: absolute; inset: 0; z-index: 1; background: linear-gradient(to top, rgba(38,26,16,.74), rgba(38,26,16,.12) 52%, transparent 72%); }
  .mag-pick-img { position: absolute; inset: 0; }
  .mag-pick-meta { position: absolute; left: 30px; right: 30px; bottom: 28px; z-index: 2; }
  .mag-pick-title { font-family: var(--font-display); font-size: 40px; font-weight: 600; color: #fff; margin-top: 12px; text-shadow: 0 2px 18px rgba(0,0,0,.5); }
  .mag-pick-sub { font-size: 20px; color: rgba(255,255,255,.9); text-shadow: 0 2px 12px rgba(0,0,0,.5); }
  .badge { display: inline-block; white-space: nowrap; background: var(--accent); color: #fff7ee; font-size: 15px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 7px 14px; border-radius: 999px; }
  .mag-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; height: 212px; }
  .tile-mag { padding: 22px 22px; justify-content: flex-start; gap: 18px; }
  .tile-mag .tile-ic { width: 52px; height: 52px; border-radius: 13px; }
  .tile-mag .tile-title { font-size: 22px; }
  .tile-mag .tile-sub { font-size: 14px; }
  .tile-mag .tile-go, .tile-mag .tile-num { display: none; }

  /* ---------- PLACEHOLDER ---------- */
  .ph { position: relative; overflow: hidden; background: var(--surface2); display: grid; place-items: center; }
  .ph-stripes { position: absolute; inset: 0; opacity: .5;
    background-image: repeating-linear-gradient(135deg, transparent 0 16px, rgba(124,108,80,.13) 16px 17px); }
  .ph-label { position: relative; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; letter-spacing: .04em; color: var(--ink-faint); padding: 6px 12px; background: rgba(251,246,236,.78); border-radius: 8px; }

  /* ---------- BÖLÜM KABUĞU ---------- */
  .section { display: flex; flex-direction: column; }
  .section-head { margin-bottom: 26px; }
  .section-eyebrow { font-size: 16px; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .section-title { font-family: var(--font-display); font-size: 58px; font-weight: 600; line-height: 1; margin-top: 10px; letter-spacing: -.5px; }
  .section-sub { font-size: 22px; color: var(--ink-soft); margin-top: 12px; }

  /* ---------- OTEL BİLGİLERİ ---------- */
  .info-layout { display: grid; grid-template-columns: 1fr 420px; gap: 28px; flex: 1 1 auto; min-height: 0; padding-bottom: 0; }
  .screen.sec-info { padding-bottom: 92px; }
  .info-comfort { flex: 0 0 auto; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 20px; }
  .info-card { display: flex; gap: 20px; align-items: center; background: var(--surface); border: 1.5px solid var(--line-soft); border-radius: 18px; padding: 26px 28px; }
  .info-card.is-focused { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 20px 40px -22px rgba(74,46,24,.5); background: #fffaf0; }
  .info-card.wide { grid-column: 1 / -1; }
  .info-ic { display: grid; place-items: center; width: 64px; height: 64px; border-radius: 15px; background: var(--surface2); color: var(--accent); flex-shrink: 0; border: 1px solid var(--line-soft); }
  .info-card.is-focused .info-ic { background: var(--accent); color: #fff7ee; }
  .info-t { font-size: 18px; color: var(--ink-soft); white-space: nowrap; }
  .info-v { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--ink); margin: 3px 0 4px; white-space: nowrap; }
  .info-n { font-size: 16px; color: var(--ink-faint); }
  .wifi-card { background: linear-gradient(160deg, var(--accent), #8c4a2e); color: #fff7ee; border-radius: var(--radius); padding: 38px 40px; display: flex; flex-direction: column; }
  .wifi-card .icon { color: #fff7ee; }
  .wifi-label { font-family: var(--font-display); font-size: 30px; font-weight: 600; margin: 14px 0 22px; }
  .wifi-row { display: flex; justify-content: space-between; align-items: baseline; padding: 16px 0; border-top: 1px solid rgba(255,255,255,.25); font-size: 19px; }
  .wifi-row span { opacity: .82; }
  .wifi-row b { font-family: var(--font-display); font-size: 26px; font-weight: 600; }
  .wifi-note { margin-top: auto; padding-top: 22px; font-size: 18px; line-height: 1.4; color: rgba(255,255,255,.85); border-top: 1px solid rgba(255,255,255,.22); display: flex; align-items: center; gap: 10px; }
  .wifi-note::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: #fff7ee; flex-shrink: 0; box-shadow: 0 0 0 4px rgba(255,255,255,.18); }

  /* ---------- HİZMETLER ---------- */
  .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 1fr; gap: 24px; flex: 1; min-height: 0; padding-bottom: 96px; }
  .service-card { display: flex; flex-direction: column; background: var(--surface); border: 1.5px solid var(--line-soft); border-radius: var(--radius); padding: 34px 34px; }
  .service-card.is-focused { transform: translateY(-7px) scale(1.015); border-color: var(--accent); box-shadow: 0 26px 52px -22px rgba(74,46,24,.55); background: #fffaf0; }
  .service-ic { display: grid; place-items: center; width: 78px; height: 78px; border-radius: 18px; background: var(--surface2); color: var(--accent); border: 1px solid var(--line-soft); }
  .service-card.is-focused .service-ic { background: var(--accent); color: #fff7ee; }
  .service-t { font-family: var(--font-display); font-size: 32px; font-weight: 600; margin-top: 22px; white-space: nowrap; }
  .service-s { font-size: 19px; color: var(--ink-soft); margin-top: 8px; flex: 1; }
  .service-cta { display: flex; align-items: center; gap: 9px; font-size: 18px; font-weight: 600; color: var(--ink-faint); margin-top: 18px; }
  .service-card.is-focused .service-cta { color: var(--accent); }

  /* ---------- GÖRSELLİ LİSTE ---------- */
  .place-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 1fr; gap: 24px; flex: 1; min-height: 0; padding-bottom: 96px; }
  .sec-market .place-grid { grid-template-columns: repeat(2, 1fr); }
  .sec-guide .place-grid { grid-auto-rows: 1fr; align-content: stretch; flex: 1 1 auto; min-height: 0; padding-bottom: 0; }
  .screen.sec-guide { padding-bottom: 92px; }
  .sec-guide .place-note { flex: 0 0 auto; }
  .place-note { display: flex; align-items: center; gap: 24px; margin-top: 22px; padding: 22px 32px; background: var(--surface); border: 1.5px solid var(--line-soft); border-radius: var(--radius); border-left: 5px solid var(--accent); }
  .place-intro { margin-top: 0; margin-bottom: 22px; border-left-color: var(--accent2); }
  .place-intro .place-note-ic { color: var(--accent2); }
  .place-note-ic { display: grid; place-items: center; width: 64px; height: 64px; flex-shrink: 0; border-radius: 16px; background: var(--surface2); color: var(--accent); border: 1px solid var(--line-soft); }
  .place-note-t { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--ink); }
  .place-note-d { font-size: 19px; line-height: 1.45; color: var(--ink-soft); margin-top: 5px; max-width: 1460px; text-wrap: pretty; }
  .place-card { display: flex; flex-direction: column; background: var(--surface); border: 1.5px solid var(--line-soft); border-radius: var(--radius); overflow: hidden; }
  .place-card.is-focused { transform: translateY(-7px) scale(1.012); border-color: var(--accent); box-shadow: 0 26px 52px -22px rgba(74,46,24,.55); }
  .place-img { flex: 1; min-height: 0; position: relative; }
  .slot-fill { position: absolute; inset: 0; width: 100%; height: 100%; }
  image-slot { background: var(--surface2); }
  .sec-market .place-img { min-height: 230px; }
  .place-info { padding: 22px 26px 24px; }
  .place-row { display: flex; align-items: baseline; justify-content: space-between; gap: 14px; }
  .place-t { font-family: var(--font-display); font-size: 27px; font-weight: 600; line-height: 1.1; white-space: nowrap; }
  .place-meta { display: flex; align-items: center; gap: 5px; font-size: 15px; color: var(--ink-faint); white-space: nowrap; }
  .place-meta .icon { color: var(--accent); }
  .place-s { font-size: 17px; color: var(--accent2); font-weight: 600; margin-top: 6px; }
  .place-d { font-size: 17px; color: var(--ink-soft); margin-top: 8px; line-height: 1.45; text-wrap: pretty; }
  .sec-guide .place-d { display: none; }

  /* ---------- ULAŞIM ---------- */
  .travel-layout { display: flex; flex-direction: column; flex: 1; min-height: 0; padding-bottom: 96px; }
  .travel-list { display: flex; flex-direction: column; gap: 14px; flex: 1; min-height: 0; }
  .travel-row { display: flex; align-items: center; gap: 22px; background: var(--surface); border: 1.5px solid var(--line-soft); border-radius: 16px; padding: 20px 28px; flex: 1; }
  .travel-row.is-focused { border-color: var(--accent); background: #fffaf0; box-shadow: 0 16px 36px -22px rgba(74,46,24,.5); transform: translateX(4px); }
  .travel-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); flex-shrink: 0; box-shadow: 0 0 0 5px rgba(176,97,62,.15); }
  .travel-name { flex: 1; }
  .travel-t { font-family: var(--font-display); font-size: 26px; font-weight: 600; white-space: nowrap; }
  .travel-s { font-size: 16px; color: var(--ink-faint); margin-top: 2px; }
  .travel-km { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--accent); width: 110px; text-align: right; }
  .travel-time { display: flex; align-items: center; gap: 7px; font-size: 18px; color: var(--ink-soft); width: 110px; justify-content: flex-end; }

  /* ---------- ALT İPUCU ---------- */
  .hintbar { position: absolute; left: 76px; right: 76px; bottom: 28px; display: flex; align-items: center; gap: 30px; padding-top: 18px; border-top: 1px solid var(--line); z-index: 3; }
  .hint { display: flex; align-items: center; gap: 11px; font-size: 17px; color: var(--ink-faint); }
  .keycap { font-family: ui-monospace, Menlo, monospace; font-size: 14px; font-weight: 600; color: var(--ink-soft); background: var(--surface); border: 1px solid var(--line); border-radius: 7px; padding: 5px 10px; letter-spacing: .04em; }
  .hint-home { margin-left: auto; color: var(--ink-soft); font-weight: 600; background: var(--surface); border: 1.5px solid var(--line); border-radius: 999px; padding: 9px 20px; }
  .hint-home .icon { color: var(--accent); }

  .icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="image-slot.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="core.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
